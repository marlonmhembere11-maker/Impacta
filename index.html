<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPACTA - Share Ideas</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #E31B23 0%, #8B0000 50%, #1a1a2e 100%);
            min-height: 100vh;
            color: white;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            margin-top: 50px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, #ff9999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        input, textarea {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 1rem;
            font-family: inherit;
        }
        input::placeholder, textarea::placeholder {
            color: rgba(255,255,255,0.6);
        }
        button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(135deg, #E31B23, #b01018);
            color: white;
            transition: transform 0.2s;
        }
        button:active {
            transform: scale(0.98);
        }
        .idea-card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 15px;
            margin: 10px 0;
            text-align: left;
        }
        .idea-question {
            font-weight: bold;
            color: #ff9999;
            margin-bottom: 8px;
        }
        .idea-author {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-bottom: 5px;
            cursor: pointer;
        }
        .helpful-btn, .edit-btn, .delete-btn, .comment-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 5px 15px;
            width: auto;
            margin-top: 10px;
            margin-right: 8px;
        }
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        .nav-buttons button {
            width: 50%;
            background: rgba(255,255,255,0.2);
        }
        .active-tab {
            background: linear-gradient(135deg, #E31B23, #b01018) !important;
        }
        .hidden {
            display: none;
        }
        .success {
            background: #00C853;
            color: white;
            padding: 10px;
            border-radius: 50px;
            margin: 10px 0;
            animation: fadeOut 3s ease forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; display: none; }
        }
        .login-toggle {
            margin-top: 15px;
            font-size: 0.9rem;
        }
        .login-toggle a {
            color: #ff9999;
            cursor: pointer;
            text-decoration: underline;
        }
        .profile-stats {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: left;
        }
        .profile-stats p {
            margin: 10px 0;
            font-size: 1.1rem;
        }
        .profile-stats strong {
            color: #ff9999;
            font-size: 1.3rem;
            float: right;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1a1a2e;
            padding: 25px;
            border-radius: 25px;
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .modal-content h3 {
            margin-bottom: 15px;
            text-align: center;
        }
        .modal-content textarea {
            margin: 10px 0;
        }
        .idea-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        /* Comments section */
        .comments-section {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .comment {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 10px;
            margin: 8px 0;
        }
        .comment-author {
            font-size: 0.75rem;
            color: #ff9999;
            margin-bottom: 5px;
        }
        .comment-text {
            font-size: 0.85rem;
        }
        .add-comment {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .add-comment input {
            flex: 1;
            padding: 8px;
            margin: 0;
            font-size: 0.85rem;
        }
        .add-comment button {
            width: auto;
            padding: 8px 15px;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- LOGIN SECTION (Now on Profile Page) -->
        <div id="loginBox" class="card">
            <h1>🌱 IMPACTA</h1>
            <p style="margin-bottom: 20px;">Small steps lead to big impact</p>
            <p style="margin-bottom: 15px;">Join the world full of problem solvers</p>
            
            <div id="loginForm">
                <input type="text" id="loginUsername" placeholder="Username">
                <input type="password" id="loginPassword" placeholder="Password">
                <button id="doLoginBtn">Login</button>
                <div class="login-toggle">
                    Don't have an account? <a id="showSignupBtn">Sign Up</a>
                </div>
            </div>
            
            <div id="signupForm" class="hidden">
                <input type="text" id="signupUsername" placeholder="Choose username">
                <input type="password" id="signupPassword" placeholder="Choose password">
                <button id="doSignupBtn">Sign Up</button>
                <div class="login-toggle">
                    Already have an account? <a id="showLoginBtn">Login</a>
                </div>
            </div>
        </div>

        <!-- MAIN APP SECTION -->
        <div id="appBox" class="card hidden">
            <h2>Welcome, <span id="currentUser">---</span>!</h2>
            
            <div class="nav-buttons">
                <button id="feedTabBtn" class="active-tab">Feed</button>
                <button id="postTabBtn">Post Idea</button>
                <button id="profileTabBtn">Profile</button>
            </div>

            <!-- FEED TAB -->
            <div id="feedTab">
                <div id="feedList">Loading ideas...</div>
            </div>

            <!-- POST TAB -->
            <div id="postTab" class="hidden">
                <textarea id="question" rows="2" placeholder="What is the problem or question?"></textarea>
                <textarea id="answer" rows="3" placeholder="What is your solution or answer?"></textarea>
                <button id="postBtn">📤 Post Solution</button>
            </div>

            <!-- PROFILE TAB -->
            <div id="profileTab" class="hidden">
                <div class="profile-stats">
                    <p>📝 Ideas posted: <strong id="profileIdeas">0</strong></p>
                    <p>✅ People helped: <strong id="profileHelpful">0</strong></p>
                    <p>🏆 Impact points: <strong id="profilePoints">0</strong></p>
                </div>
                <div class="login-toggle" style="margin-top: 20px;">
                    <a id="logoutLink">Logout</a>
                </div>
            </div>

            <button id="logoutBtn" style="margin-top: 20px; background: rgba(255,255,255,0.2);">Logout</button>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div id="editModal" class="modal hidden">
        <div class="modal-content">
            <h3>✏️ Edit Your Idea</h3>
            <textarea id="editQuestion" rows="2" placeholder="Question"></textarea>
            <textarea id="editAnswer" rows="3" placeholder="Answer"></textarea>
            <button id="saveEditBtn">Save Changes</button>
            <button id="cancelEditBtn">Cancel</button>
        </div>
    </div>

    <script>
        // ============ SUPABASE SETUP ============
        const MY_URL = 'https://ygsacbhcolhvkpcaxpic.supabase.co';
        const MY_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlnc2FjYmhjb2xodmtwY2F4cGljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODQ2OTUsImV4cCI6MjA5MTA2MDY5NX0.XCX771p7GRrnti3ZlZE4Y1zWALbK_tvaL0wCNHUTVEI';
        const sb = window.supabase.createClient(MY_URL, MY_KEY);
        
        let currentUser = null;
        let allIdeas = [];
        let allComments = [];
        let currentEditId = null;

        // ============ DOM ELEMENTS ============
        const loginBox = document.getElementById('loginBox');
        const appBox = document.getElementById('appBox');
        const currentUserSpan = document.getElementById('currentUser');
        const feedList = document.getElementById('feedList');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');

        // ============ TOGGLE LOGIN/SIGNUP ============
        document.getElementById('showSignupBtn').onclick = () => {
            loginForm.classList.add('hidden');
            signupForm.classList.remove('hidden');
        };
        document.getElementById('showLoginBtn').onclick = () => {
            signupForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
        };

        // ============ SIGNUP ============
        document.getElementById('doSignupBtn').onclick = async () => {
            const username = document.getElementById('signupUsername').value.trim();
            const password = document.getElementById('signupPassword').value;
            
            if (!username || !password) {
                alert("Please enter both username and password");
                return;
            }
            
            const { data: existing } = await sb
                .from('users')
                .select('username')
                .eq('username', username);
            
            if (existing && existing.length > 0) {
                alert("Username already taken. Please choose another.");
                return;
            }
            
            const { error } = await sb
                .from('users')
                .insert([{ username: username, password: password, ideas: 0, helpful_received: 0 }]);
            
            if (error) {
                alert("Signup failed: " + error.message);
                return;
            }
            
            alert("✅ Account created successfully! Please login.");
            
            document.getElementById('signupUsername').value = '';
            document.getElementById('signupPassword').value = '';
            signupForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
        };

        // ============ LOGIN ============
        document.getElementById('doLoginBtn').onclick = async () => {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                alert("Please enter username and password");
                return;
            }
            
            const { data, error } = await sb
                .from('users')
                .select('*')
                .eq('username', username)
                .eq('password', password);
            
            if (error) {
                alert("Login error: " + error.message);
                return;
            }
            
            if (!data || data.length === 0) {
                alert("Invalid username or password");
                return;
            }
            
            currentUser = data[0];
            currentUserSpan.innerText = currentUser.username;
            loginBox.style.display = 'none';
            appBox.style.display = 'block';
            await loadComments();
            await loadFeed();
        };

        // ============ LOGOUT ============
        document.getElementById('logoutBtn').onclick = () => {
            currentUser = null;
            loginBox.style.display = 'block';
            appBox.style.display = 'none';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        };
        document.getElementById('logoutLink').onclick = () => {
            currentUser = null;
            loginBox.style.display = 'block';
            appBox.style.display = 'none';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        };

        // ============ TAB SWITCHING ============
        document.getElementById('feedTabBtn').onclick = () => {
            document.getElementById('feedTab').classList.remove('hidden');
            document.getElementById('postTab').classList.add('hidden');
            document.getElementById('profileTab').classList.add('hidden');
            document.getElementById('feedTabBtn').classList.add('active-tab');
            document.getElementById('postTabBtn').classList.remove('active-tab');
            document.getElementById('profileTabBtn').classList.remove('active-tab');
            loadFeed();
        };
        
        document.getElementById('postTabBtn').onclick = () => {
            document.getElementById('feedTab').classList.add('hidden');
            document.getElementById('postTab').classList.remove('hidden');
            document.getElementById('profileTab').classList.add('hidden');
            document.getElementById('postTabBtn').classList.add('active-tab');
            document.getElementById('feedTabBtn').classList.remove('active-tab');
            document.getElementById('profileTabBtn').classList.remove('active-tab');
        };
        
        document.getElementById('profileTabBtn').onclick = () => {
            document.getElementById('feedTab').classList.add('hidden');
            document.getElementById('postTab').classList.add('hidden');
            document.getElementById('profileTab').classList.remove('hidden');
            document.getElementById('profileTabBtn').classList.add('active-tab');
            document.getElementById('feedTabBtn').classList.remove('active-tab');
            document.getElementById('postTabBtn').classList.remove('active-tab');
            updateProfile();
        };

        // ============ POST IDEA ============
        document.getElementById('postBtn').onclick = async () => {
            if (!currentUser) return;
            const question = document.getElementById('question').value.trim();
            const answer = document.getElementById('answer').value.trim();
            
            if (!question || !answer) {
                alert("Please write both a question and an answer");
                return;
            }
            
            const { error } = await sb.from('ideas').insert({
                author: currentUser.username,
                question: question,
                answer: answer,
                helpful_count: 0
            });
            
            if (error) {
                alert("Error posting: " + error.message);
                return;
            }
            
            await sb.from('users').update({ ideas: (currentUser.ideas || 0) + 1 }).eq('id', currentUser.id);
            currentUser.ideas = (currentUser.ideas || 0) + 1;
            
            document.getElementById('question').value = '';
            document.getElementById('answer').value = '';
            await loadFeed();
            showSuccessMessage('✅ Idea posted! +10 impact points');
            document.getElementById('feedTabBtn').click();
        };

        // ============ LOAD COMMENTS ============
        async function loadComments() {
            const { data } = await sb.from('comments').select('*');
            allComments = data || [];
        }

        // ============ ADD COMMENT ============
        async function addComment(ideaId, commentText) {
            if (!currentUser) {
                alert("Please login to comment");
                return;
            }
            
            if (!commentText.trim()) return;
            
            await sb.from('comments').insert({
                user_id: currentUser.id,
                idea_id: ideaId,
                comment: commentText.trim()
            });
            
            await loadComments();
            await loadFeed();
        }

        // ============ LOAD FEED ============
        async function loadFeed() {
            feedList.innerHTML = 'Loading ideas...';
            
            const { data, error } = await sb
                .from('ideas')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) {
                feedList.innerHTML = 'Error loading ideas';
                return;
            }
            
            allIdeas = data || [];
            
            if (allIdeas.length === 0) {
                feedList.innerHTML = 'No ideas yet. Be the first to post!';
                return;
            }
            
            feedList.innerHTML = allIdeas.map(idea => {
                const ideaComments = allComments.filter(c => c.idea_id === idea.id);
                return `
                <div class="idea-card">
                    <div class="idea-author" onclick="viewProfile('${idea.author}')">👤 ${escapeHtml(idea.author)}</div>
                    <div class="idea-question">❓ ${escapeHtml(idea.question)}</div>
                    <div>💡 ${escapeHtml(idea.answer)}</div>
                    <div class="idea-buttons">
                        <button class="helpful-btn" data-id="${idea.id}">✅ Was this helpful? (${idea.helpful_count})</button>
                        ${idea.author === currentUser.username ? `
                            <button class="edit-btn" data-id="${idea.id}">✏️ Edit</button>
                            <button class="delete-btn" data-id="${idea.id}">🗑️ Delete</button>
                        ` : ''}
                        <button class="comment-btn" data-id="${idea.id}" onclick="toggleComments(${idea.id})">💬 Comments (${ideaComments.length})</button>
                    </div>
                    <div id="comments-${idea.id}" class="comments-section hidden">
                        <div id="comments-list-${idea.id}">
                            ${ideaComments.map(c => `
                                <div class="comment">
                                    <div class="comment-author">${escapeHtml(c.username) || 'User'} · ${new Date(c.created_at).toLocaleDateString()}</div>
                                    <div class="comment-text">${escapeHtml(c.comment)}</div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="add-comment">
                            <input type="text" id="comment-input-${idea.id}" placeholder="Write a comment...">
                            <button onclick="submitComment(${idea.id})">Post</button>
                        </div>
                    </div>
                </div>
            `}).join('');
            
            attachIdeaEvents();
        }

        // ============ TOGGLE COMMENTS ============
        window.toggleComments = (ideaId) => {
            const commentsDiv = document.getElementById(`comments-${ideaId}`);
            if (commentsDiv) {
                commentsDiv.classList.toggle('hidden');
            }
        };

        // ============ SUBMIT COMMENT ============
        window.submitComment = async (ideaId) => {
            const input = document.getElementById(`comment-input-${ideaId}`);
            const commentText = input.value;
            if (!commentText.trim()) return;
            
            await addComment(ideaId, commentText);
            input.value = '';
        };

        // ============ VIEW PROFILE ============
        window.viewProfile = (username) => {
            showToast(`Viewing ${username}'s profile - Coming soon!`);
        };

        // ============ ATTACH BUTTON EVENTS ============
        function attachIdeaEvents() {
            document.querySelectorAll('.helpful-btn').forEach(btn => {
                btn.onclick = () => markHelpful(parseInt(btn.dataset.id));
            });
            
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.onclick = () => {
                    const ideaId = parseInt(btn.dataset.id);
                    const idea = allIdeas.find(i => i.id === ideaId);
                    currentEditId = ideaId;
                    document.getElementById('editQuestion').value = idea.question;
                    document.getElementById('editAnswer').value = idea.answer;
                    document.getElementById('editModal').classList.remove('hidden');
                };
            });
            
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.onclick = async () => {
                    if (confirm('Are you sure you want to delete this idea?')) {
                        const ideaId = parseInt(btn.dataset.id);
                        await sb.from('ideas').delete().eq('id', ideaId);
                        await loadFeed();
                        showSuccessMessage('🗑️ Idea deleted');
                    }
                };
            });
        }

        // ============ MARK HELPFUL ============
        async function markHelpful(ideaId) {
            if (!currentUser) {
                alert("Please login first");
                return;
            }
            
            const idea = allIdeas.find(i => i.id === ideaId);
            if (!idea) return;
            
            if (idea.author === currentUser.username) {
                alert("You can't mark your own idea as helpful");
                return;
            }
            
            const { data: existing } = await sb
                .from('helpful_votes')
                .select('*')
                .eq('user_id', currentUser.id)
                .eq('idea_id', ideaId);
            
            if (existing && existing.length > 0) {
                alert("You already marked this idea as helpful");
                return;
            }
            
            await sb.from('helpful_votes').insert({
                user_id: currentUser.id,
                idea_id: ideaId
            });
            
            const newCount = (idea.helpful_count || 0) + 1;
            await sb.from('ideas').update({ helpful_count: newCount }).eq('id', ideaId);
            
            const { data: author } = await sb.from('users').select('*').eq('username', idea.author);
            if (author && author.length > 0) {
                await sb.from('users').update({ helpful_received: (author[0].helpful_received || 0) + 1 }).eq('id', author[0].id);
            }
            
            await loadFeed();
            showSuccessMessage('✅ You helped someone! +5 impact points');
        }

        // ============ UPDATE PROFILE ============
        async function updateProfile() {
            if (!currentUser) return;
            
            const { data: freshUser } = await sb
                .from('users')
                .select('*')
                .eq('id', currentUser.id);
            
            if (freshUser && freshUser.length > 0) {
                currentUser = freshUser[0];
                currentUserSpan.innerText = currentUser.username;
            }
            
            const myIdeas = allIdeas.filter(idea => idea.author === currentUser.username);
            const ideasCount = myIdeas.length;
            const helpfulCount = myIdeas.reduce((sum, idea) => sum + (idea.helpful_count || 0), 0);
            const points = (ideasCount * 10) + (helpfulCount * 5);
            
            document.getElementById('profileIdeas').innerText = ideasCount;
            document.getElementById('profileHelpful').innerText = helpfulCount;
            document.getElementById('profilePoints').innerText = points;
        }

        // ============ EDIT MODAL FUNCTIONS ============
        document.getElementById('saveEditBtn').onclick = async () => {
            const newQuestion = document.getElementById('editQuestion').value.trim();
            const newAnswer = document.getElementById('editAnswer').value.trim();
            
            if (!newQuestion || !newAnswer) {
                alert("Please write both a question and an answer");
                return;
            }
            
            await sb.from('ideas').update({ 
                question: newQuestion, 
                answer: newAnswer 
            }).eq('id', currentEditId);
            
            document.getElementById('editModal').classList.add('hidden');
            await loadFeed();
            showSuccessMessage('✅ Idea updated!');
        };
        
        document.getElementById('cancelEditBtn').onclick = () => {
            document.getElementById('editModal').classList.add('hidden');
        };

        // ============ SHOW SUCCESS MESSAGE ============
        function showSuccessMessage(message) {
            const container = document.querySelector('#appBox');
            const successDiv = document.createElement('div');
            successDiv.className = 'success';
            successDiv.innerText = message;
            container.insertBefore(successDiv, container.firstChild);
            setTimeout(() => successDiv.remove(), 3000);
        }

        function showToast(message) {
            const container = document.querySelector('#appBox');
            const toastDiv = document.createElement('div');
            toastDiv.className = 'success';
            toastDiv.innerText = message;
            container.insertBefore(toastDiv, container.firstChild);
            setTimeout(() => toastDiv.remove(), 3000);
        }

        // ============ HELPER ============
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
