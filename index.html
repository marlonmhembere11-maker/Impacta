<!DOCTYPE html>
<html>
<head>
    <title>IMPACTA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #E31B23, #8B0000);
            color: white;
            text-align: center;
            padding: 50px;
        }
        .box {
            background: rgba(0,0,0,0.4);
            padding: 30px;
            border-radius: 30px;
            max-width: 500px;
            margin: 0 auto;
        }
        input, textarea {
            padding: 12px;
            margin: 10px;
            border-radius: 25px;
            border: none;
            width: 80%;
        }
        button {
            padding: 12px 24px;
            margin: 10px;
            border-radius: 25px;
            border: none;
            background: white;
            color: #E31B23;
            font-weight: bold;
            cursor: pointer;
        }
        .hidden {
            display: none;
        }
        .idea {
            background: rgba(255,255,255,0.1);
            margin: 10px;
            padding: 15px;
            border-radius: 15px;
            text-align: left;
        }
        .login-toggle {
            margin-top: 15px;
            font-size: 0.9rem;
        }
        .login-toggle a {
            color: #ff9999;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div id="loginBox" class="box">
    <h1>IMPACTA</h1>
    
    <div id="loginForm">
        <input type="text" id="loginUsername" placeholder="Username">
        <input type="password" id="loginPassword" placeholder="Password">
        <button id="loginBtn">Login</button>
        <div class="login-toggle">
            Don't have an account? <a id="showSignupLink">Sign Up</a>
        </div>
    </div>
    
    <div id="signupForm" class="hidden">
        <input type="text" id="signupUsername" placeholder="Choose username">
        <input type="password" id="signupPassword" placeholder="Choose password">
        <button id="signupBtn">Sign Up</button>
        <div class="login-toggle">
            Already have an account? <a id="showLoginLink">Login</a>
        </div>
    </div>
</div>

<div id="appBox" class="box hidden">
    <h2>Welcome, <span id="userName"></span>!</h2>
    <textarea id="question" rows="2" placeholder="Your question?"></textarea>
    <textarea id="answer" rows="2" placeholder="Your answer?"></textarea>
    <br>
    <button id="postBtn">Post Idea</button>
    <h3>Feed</h3>
    <div id="feed"></div>
    <button id="logoutBtn">Logout</button>
</div>

<script>
    // Supabase setup
    const SUPABASE_URL = 'https://yywokkfnhoxwbohylisw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl5d29ra2ZuaG94d2JvaHlsaXN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NzQ5NzAsImV4cCI6MjA5MTE1MDk3MH0.hWrtxQ68HAqCz6ENf0DMkU-F2roQpndh_KErZHDz_6c';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentUser = null;
    
    // Toggle between login and signup
    document.getElementById('showSignupLink').onclick = () => {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('signupForm').classList.remove('hidden');
    };
    document.getElementById('showLoginLink').onclick = () => {
        document.getElementById('signupForm').classList.add('hidden');
        document.getElementById('loginForm').classList.remove('hidden');
    };
    
    // SIGNUP
    document.getElementById('signupBtn').onclick = async () => {
        const username = document.getElementById('signupUsername').value.trim();
        const password = document.getElementById('signupPassword').value;
        
        if (!username || !password) {
            alert("Enter username and password");
            return;
        }
        
        // Check if user exists
        const { data: existing } = await supabase
            .from('users')
            .select('username')
            .eq('username', username);
        
        if (existing && existing.length > 0) {
            alert("Username already taken");
            return;
        }
        
        // Create user
        const { error } = await supabase
            .from('users')
            .insert({ username: username, password: password, ideas: 0, helpful_received: 0 });
        
        if (error) {
            alert("Signup error: " + error.message);
            return;
        }
        
        alert("Account created! Please login.");
        document.getElementById('signupUsername').value = '';
        document.getElementById('signupPassword').value = '';
        document.getElementById('signupForm').classList.add('hidden');
        document.getElementById('loginForm').classList.remove('hidden');
    };
    
    // LOGIN
    document.getElementById('loginBtn').onclick = async () => {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        if (!username || !password) {
            alert("Enter username and password");
            return;
        }
        
        const { data } = await supabase
            .from('users')
            .select('*')
            .eq('username', username)
            .eq('password', password);
        
        if (!data || data.length === 0) {
            alert("Invalid username or password");
            return;
        }
        
        currentUser = data[0];
        document.getElementById('userName').innerText = currentUser.username;
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('appBox').style.display = 'block';
        await loadFeed();
    };
    
    // LOGOUT
    document.getElementById('logoutBtn').onclick = () => {
        currentUser = null;
        document.getElementById('loginBox').style.display = 'block';
        document.getElementById('appBox').style.display = 'none';
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
    };
    
    // POST IDEA
    document.getElementById('postBtn').onclick = async () => {
        if (!currentUser) return;
        const question = document.getElementById('question').value.trim();
        const answer = document.getElementById('answer').value.trim();
        
        if (!question || !answer) {
            alert("Write both question and answer");
            return;
        }
        
        await supabase.from('ideas').insert({
            author: currentUser.username,
            question: question,
            answer: answer,
            helpful_count: 0
        });
        
        document.getElementById('question').value = '';
        document.getElementById('answer').value = '';
        await loadFeed();
        alert("Idea posted!");
    };
    
    // LOAD FEED
    async function loadFeed() {
        const feedDiv = document.getElementById('feed');
        feedDiv.innerHTML = 'Loading...';
        
        const { data } = await supabase
            .from('ideas')
            .select('*')
            .order('created_at', { ascending: false });
        
        if (!data || data.length === 0) {
            feedDiv.innerHTML = 'No ideas yet. Be the first!';
            return;
        }
        
        feedDiv.innerHTML = data.map(idea => `
            <div class="idea">
                <strong>${escapeHtml(idea.author)}</strong>
                <p><strong>❓ ${escapeHtml(idea.question)}</strong></p>
                <p>💡 ${escapeHtml(idea.answer)}</p>
                <button onclick="markHelpful(${idea.id})">✅ Helpful (${idea.helpful_count})</button>
            </div>
        `).join('');
    }
    
    // MARK HELPFUL
    window.markHelpful = async (id) => {
        if (!currentUser) {
            alert("Login first");
            return;
        }
        
        const { data } = await supabase
            .from('ideas')
            .select('*')
            .eq('id', id);
        
        if (data[0].author === currentUser.username) {
            alert("Can't mark your own");
            return;
        }
        
        await supabase
            .from('ideas')
            .update({ helpful_count: data[0].helpful_count + 1 })
            .eq('id', id);
        
        await loadFeed();
        alert("Thanks for helping!");
    };
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>
</body>
</html>
