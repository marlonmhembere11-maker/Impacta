<!DOCTYPE html>
<html>
<head>
    <title>IMPACTA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body{font-family:Arial;background:linear-gradient(135deg,#E31B23,#8B0000);color:white;text-align:center;padding:50px;}
        .box{background:rgba(0,0,0,0.4);padding:30px;border-radius:30px;max-width:500px;margin:0 auto;}
        input,textarea{padding:12px;margin:10px;border-radius:25px;border:none;width:80%;}
        button{padding:12px 24px;margin:10px;border-radius:25px;border:none;background:white;color:#E31B23;font-weight:bold;cursor:pointer;}
        .hidden{display:none;}
        .idea{background:rgba(255,255,255,0.1);margin:10px;padding:15px;border-radius:15px;text-align:left;}
    </style>
</head>
<body>
<div id="loginBox" class="box">
    <h1>IMPACTA</h1>
    <input type="text" id="username" placeholder="Enter username">
    <br>
    <button id="loginBtn">Login</button>
</div>
<div id="appBox" class="box hidden">
    <h2>Welcome, <span id="userName"></span>!</h2>
    <textarea id="question" rows="2" placeholder="Your question?"></textarea>
    <textarea id="answer" rows="2" placeholder="Your answer?"></textarea>
    <br>
    <button id="postBtn">Post Idea</button>
    <h3>Feed</h3>
    <div id="feed"></div>
    <button id="logoutBtn">Logout</button>
</div>
<script>
// ONLY ONE DECLARATION - NO DUPLICATE
const MY_URL = 'https://yywokkfnhoxwbohylisw.supabase.co';
const MY_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl5d29ra2ZuaG94d2JvaHlsaXN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NzQ5NzAsImV4cCI6MjA5MTE1MDk3MH0.hWrtxQ68HAqCz6ENf0DMkU-F2roQpndh_KErZHDz_6c';
const sb = window.supabase.createClient(MY_URL, MY_KEY);
let currentUser = null;

document.getElementById('loginBtn').onclick = async function() {
    let name = document.getElementById('username').value.trim();
    if (!name) { alert("Enter username"); return; }
    currentUser = name;
    document.getElementById('userName').innerText = name;
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('appBox').style.display = 'block';
    await loadFeed();
};

document.getElementById('logoutBtn').onclick = function() {
    currentUser = null;
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('appBox').style.display = 'none';
    document.getElementById('username').value = '';
};

document.getElementById('postBtn').onclick = async function() {
    if (!currentUser) return;
    let q = document.getElementById('question').value.trim();
    let a = document.getElementById('answer').value.trim();
    if (!q || !a) { alert("Write both"); return; }
    await sb.from('ideas').insert({ author: currentUser, question: q, answer: a, helpful_count: 0 });
    document.getElementById('question').value = '';
    document.getElementById('answer').value = '';
    await loadFeed();
    alert("Posted!");
};

async function loadFeed() {
    let feedDiv = document.getElementById('feed');
    feedDiv.innerHTML = 'Loading...';
    let { data } = await sb.from('ideas').select('*').order('created_at', { ascending: false });
    if (!data || data.length === 0) { feedDiv.innerHTML = 'No ideas yet.'; return; }
    feedDiv.innerHTML = data.map(idea => `<div class="idea"><strong>${escapeHtml(idea.author)}</strong><p><strong>❓ ${escapeHtml(idea.question)}</strong></p><p>💡 ${escapeHtml(idea.answer)}</p><button onclick="markHelpful(${idea.id})">✅ Helpful (${idea.helpful_count})</button></div>`).join('');
}

window.markHelpful = async function(id) {
    if (!currentUser) { alert("Login first"); return; }
    let { data } = await sb.from('ideas').select('*').eq('id', id);
    if (data[0].author === currentUser) { alert("Can't mark your own"); return; }
    await sb.from('ideas').update({ helpful_count: data[0].helpful_count + 1 }).eq('id', id);
    await loadFeed();
    alert("Thanks for helping!");
};

function escapeHtml(t) { if (!t) return ''; let d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
</script>
</body>
</html>
